[build]
builder = "railpack"
buildCommand = "bun run build && cp -r public .next/standalone/ && cp -r .next/static .next/standalone/.next/"

[deploy]
startCommand = "HOSTNAME=0.0.0.0 node .next/standalone/server.js"
healthcheckPath = "/api/healthcheck"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
maxRestartRetries = 10

# Environment variables that might be needed
[variables]
NODE_ENV = "production"
PORT = "8080"
NEXT_TELEMETRY_DISABLED = "1"
